spring.application.name=ms-pedido
server.port=8083

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# ─── H2 DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:pedidodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 Console ──────────────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Inicialización de datos ─────────────────────────────────────────────────
# defer-datasource-initialization: ejecuta data.sql DESPUÉS de que Hibernate
# crea el esquema (necesario en Spring Boot 3 con ddl-auto != none)
spring.sql.init.mode=never
